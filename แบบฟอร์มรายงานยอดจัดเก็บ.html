<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal LINE Reporter</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00b900; --bg: #f4f7f6; --text: #4a4a4a; --card: #ffffff; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        
        /* Card Style */
        .card { background: var(--card); border-radius: 24px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); margin-bottom: 20px; }
        h3 { margin: 0 0 20px 0; font-weight: 600; font-size: 1.1rem; color: #333; }

        /* Input Styles */
        .input-group { margin-bottom: 15px; }
        label { font-size: 0.85rem; color: #888; margin-bottom: 6px; display: block; }
        select, input { 
            width: 100%; border: 1.5px solid #eee; border-radius: 12px; padding: 12px; 
            font-size: 1rem; transition: 0.3s; box-sizing: border-box; font-family: 'Sarabun';
        }
        input:focus { border-color: var(--primary); outline: none; background: #fafafa; }

        /* Bucket Pads (Pills) */
        .bucket-container { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .bucket-pad { 
            padding: 8px 16px; border: 1.5px solid #eee; border-radius: 20px; 
            cursor: pointer; font-size: 0.9rem; transition: 0.2s; background: white;
        }
        .bucket-pad.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* List Styles */
        .item-list { list-style: none; padding: 0; margin: 0; }
        .item-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 0; border-bottom: 1px solid #f0f0f0; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .item-info { flex: 1; }
        .item-main { font-weight: 600; font-size: 0.95rem; }
        .item-sub { font-size: 0.8rem; color: #999; }
        .btn-del { color: #ff6b6b; background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px 10px; }

        /* Button Styles */
        .btn { border: none; border-radius: 16px; padding: 14px; width: 100%; font-weight: 600; cursor: pointer; font-family: 'Sarabun'; transition: 0.3s; }
        .btn-add { background: #f0f0f0; color: #555; margin-top: 10px; }
        .btn-add:hover { background: #e5e5e5; }
        .btn-send { background: var(--primary); color: white; margin-top: 10px; box-shadow: 0 8px 20px rgba(0,185,0,0.2); }
        
        .total-area { margin-top: 20px; padding-top: 15px; border-top: 2px dashed #eee; display: flex; justify-content: space-between; align-items: center; }
        .total-price { font-size: 1.4rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <label>เลือกสาขา</label>
        <select id="branch">
            <option>สาขาเขาช่องพราน</option><option>สาขานางแก้ว</option><option>สาขาจอมบึง</option>
            <option>สาขาดอนตูมราชบุรี</option><option>สาขาสวนผึ้ง</option><option>สาขาบ้านคา</option>
            <option>สาขาด่านทับตะโก</option><option>สาขาหุบกระทิง</option><option>สาขาชัฎป่าหวาย</option>
            <option>สาขาหนองเสือ</option><option>สาขาท่ามะกา</option><option>สาขาลูกแก</option>
            <option>สาขาหนองตากยา</option><option>สาขาท่าเรือ</option><option>สาขาตะคร้ำเอน</option>
        </select>
    </div>

    <div class="card">
        <h3>➕ เพิ่มรายการใหม่</h3>
        
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Due Date</label>
                <input type="text" id="temp-due" placeholder="เช่น 4/2">
            </div>
            <div style="flex: 2;">
                <label>ยอดหนี้ (บาท)</label>
                <input type="number" id="temp-amt" placeholder="0.00">
            </div>
        </div>

        <label style="margin-top:15px;">Bucket</label>
        <div class="bucket-container" id="bucket-pills">
            <div class="bucket-pad active" onclick="selectBucket(this)">B0</div>
            <div class="bucket-pad" onclick="selectBucket(this)">B1</div>
            <div class="bucket-pad" onclick="selectBucket(this)">B2</div>
            <div class="bucket-pad" onclick="selectBucket(this)">B3</div>
            <div class="bucket-pad" onclick="selectBucket(this)">B4</div>
            <div class="bucket-pad" onclick="selectBucket(this)">B5</div>
        </div>

        <label>เลขที่สัญญา</label>
        <input type="text" id="temp-cnt" placeholder="ระบุเลขที่สัญญา">

        <button class="btn btn-add" onclick="addItemToList()">+ เพิ่มลงในรายการ</button>
    </div>

    <div class="card" id="list-card" style="display:none;">
        <h3>📋 รายชื่อที่เตรียมส่ง</h3>
        <ul class="item-list" id="final-list"></ul>

        <div class="total-area">
            <span>รวมผลลัพธ์:</span>
            <span class="total-price"><span id="grand-total">0</span> <small style="font-size:0.8rem; color:#999">บาท</small></span>
        </div>

        <button class="btn btn-send" onclick="sendToLine()">ส่งข้อมูลเข้า LINE</button>
    </div>
</div>

<script>
    let selectedBucket = "B0";
    let items = [];

    function selectBucket(el) {
        document.querySelectorAll('.bucket-pad').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        selectedBucket = el.innerText;
    }

    function addItemToList() {
        const due = document.getElementById('temp-due').value || '-';
        const amt = parseFloat(document.getElementById('temp-amt').value) || 0;
        const cnt = document.getElementById('temp-cnt').value || '-';

        if(amt <= 0) { alert("กรุณาระบุยอดหนี้"); return; }

        const item = { id: Date.now(), due, amt, cnt, bucket: selectedBucket };
        items.push(item);
        
        renderList();
        
        // ล้างข้อมูลช่องกรอก
        document.getElementById('temp-amt').value = '';
        document.getElementById('temp-cnt').value = '';
    }

    function renderList() {
        const listContainer = document.getElementById('final-list');
        const listCard = document.getElementById('list-card');
        
        if(items.length > 0) listCard.style.display = 'block';
        else listCard.style.display = 'none';

        listContainer.innerHTML = items.map(item => `
            <li class="item-row">
                <div class="item-info">
                    <div class="item-main">${item.cnt} = ${item.amt.toLocaleString()} บาท</div>
                    <div class="item-sub">Due ${item.due} (${item.bucket})</div>
                </div>
                <button class="btn-del" onclick="removeItem(${item.id})">×</button>
            </li>
        `).join('');

        const total = items.reduce((sum, item) => sum + item.amt, 0);
        document.getElementById('grand-total').innerText = total.toLocaleString();
    }

    function removeItem(id) {
        items = items.filter(i => i.id !== id);
        renderList();
    }

    function sendToLine() {
        const branch = document.getElementById('branch').value;
        let message = branch + "\n";
        let total = 0;

        items.forEach(item => {
            message += `Due ${item.due} (${item.bucket})\n`;
            message += `${item.cnt} = ${item.amt.toLocaleString()}\n`;
            total += item.amt;
        });

        message += `รวม ${total.toLocaleString()} บาท`;
        window.location.href = "https://line.me/R/msg/text/?" + encodeURIComponent(message);
    }
</script>

</body>
</html>
