<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collectio | สรุปยอดจัดเก็บแยก Bucket</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00b900; --dark: #1a1a1a; --bg: #f2f4f7; --card: #ffffff; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 20px 15px; }
        .container { max-width: 480px; margin: auto; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 1.8rem; color: var(--dark); letter-spacing: 1px; }
        .header p { margin: 5px 0 0; font-size: 0.9rem; color: #888; }
        .card { background: var(--card); border-radius: 24px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.02); }
        h3 { margin: 0 0 18px 0; font-size: 0.95rem; font-weight: 600; color: #aaa; text-transform: uppercase; }
        label { font-size: 0.8rem; font-weight: 600; color: #555; display: block; margin-bottom: 8px; }
        select, input { width: 100%; border: 1.5px solid #eee; border-radius: 14px; padding: 12px; font-size: 1rem; box-sizing: border-box; font-family: 'Sarabun'; background: #fcfcfc; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: #fff; outline: none; }
        .bucket-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin: 12px 0; }
        .b-pad { padding: 10px 0; border: 1.5px solid #eee; border-radius: 12px; text-align: center; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.2s; background: white; }
        .b-pad.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 10px rgba(0,185,0,0.2); }
        .item-list { border-top: 1px solid #f5f5f5; margin-top: 15px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .item b { font-size: 1rem; color: var(--dark); }
        .item-del { color: #ffbcbc; cursor: pointer; font-size: 1.2rem; padding-left: 15px; }
        .btn { border: none; border-radius: 16px; padding: 16px; width: 100%; font-weight: 600; cursor: pointer; font-family: 'Sarabun'; margin-top: 10px; transition: 0.3s; font-size: 1rem; }
        .btn-add { background: #f0fdf4; color: var(--primary); border: 1.5px dashed var(--primary); }
        .btn-send { background: var(--primary); color: white; box-shadow: 0 6px 20px rgba(0,185,0,0.25); margin-top: 20px; }
        .btn-daily { background: var(--dark); color: white; margin-top: 10px; }
        .summary-box { margin-top: 15px; display: flex; justify-content: space-between; align-items: baseline; }
        .summary-box span { font-size: 1.4rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Collectio</h1>
        <p>สรุปยอดจัดเก็บแยก Bucket</p>
    </div>

    <div class="card">
        <label>เลือกสาขาปฏิบัติงาน</label>
        <select id="branch">
            <option>สาขาเขาช่องพราน</option><option>สาขานางแก้ว</option><option>สาขาจอมบึง</option>
            <option>สาขาดอนตูมราชบุรี</option><option>สาขาสวนผึ้ง</option><option>สาขาบ้านคา</option>
            <option>สาขาด่านทับตะโก</option><option>สาขาหุบกระทิง</option><option>สาขาชัฎป่าหวาย</option>
            <option>สาขาหนองเสือ</option><option>สาขาท่ามะกา</option><option>สาขาลูกแก</option>
            <option>สาขาหนองตากยา</option><option>สาขาท่าเรือ</option><option>สาขาตะคร้ำเอน</option>
        </select>
    </div>

    <div class="card">
        <h3>➕ เพิ่มรายการ</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 12px;">
            <div style="flex:1"><label>Due</label><input type="text" id="t-due" placeholder="4/2"></div>
            <div style="flex:2"><label>ยอดหนี้ (บาท)</label><input type="number" id="t-amt" placeholder="0.00"></div>
        </div>
        <label>Bucket</label>
        <div class="bucket-grid">
            <div class="b-pad active" onclick="setB(this)">B0</div>
            <div class="b-pad" onclick="setB(this)">B1</div>
            <div class="b-pad" onclick="setB(this)">B2</div>
            <div class="b-pad" onclick="setB(this)">B3</div>
            <div class="b-pad" onclick="setB(this)">B4</div>
            <div class="b-pad" onclick="setB(this)">B5</div>
        </div>
        <label>เลขที่สัญญา</label>
        <input type="text" id="t-cnt" placeholder="ระบุเลขที่สัญญา">
        <button class="btn btn-add" onclick="addItem()">เพิ่มลงรายการ</button>
    </div>

    <div class="card" id="list-card" style="display:none;">
        <h3>📋 รายการเตรียมส่ง</h3>
        <div id="final-list" class="item-list"></div>
        <div class="summary-box">
            <small style="color:#999">รวมรอบนี้:</small>
            <span><span id="g-total">0</span> <small style="font-size:0.8rem">บาท</small></span>
        </div>
        <button class="btn btn-send" onclick="sendLine()">ส่งเข้า LINE</button>
    </div>

    <button class="btn btn-daily" onclick="sendDailySummary()">📊 สรุปยอดแยก Bucket วันนี้</button>
</div>

<script>
    let currentB = "B0";
    let items = [];

    function setB(el) {
        document.querySelectorAll('.b-pad').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        currentB = el.innerText;
    }

    function addItem() {
        const due = document.getElementById('t-due').value || '-';
        const amt = parseFloat(document.getElementById('t-amt').value) || 0;
        const cnt = document.getElementById('t-cnt').value || '-';
        if(amt <= 0) return;
        items.push({ id: Date.now(), due, amt, cnt, bkt: currentB });
        render();
        document.getElementById('t-amt').value = '';
        document.getElementById('t-cnt').value = '';
    }

    function render() {
        const listCard = document.getElementById('list-card');
        const container = document.getElementById('final-list');
        listCard.style.display = items.length ? 'block' : 'none';
        container.innerHTML = items.map(i => `
            <div class="item">
                <div><b>${i.cnt}</b><br><small>Due ${i.due} (${i.bkt})</small></div>
                <div style="text-align:right"><b>${i.amt.toLocaleString()}</b><span class="item-del" onclick="remove(${i.id})">✕</span></div>
            </div>
        `).join('');
        const total = items.reduce((s, i) => s + i.amt, 0);
        document.getElementById('g-total').innerText = total.toLocaleString();
    }

    function remove(id) { items = items.filter(i => i.id !== id); render(); }

    function sendLine() {
        const branch = document.getElementById('branch').value;
        let msg = branch + "\n";
        let batchTotal = 0;
        let batchStats = {};

        items.forEach(i => {
            msg += `Due ${i.due} (${i.bkt})\n${i.cnt} = ${i.amt.toLocaleString()}\n`;
            batchTotal += i.amt;
            batchStats[i.bkt] = (batchStats[i.bkt] || 0) + i.amt;
        });
        msg += `รวม ${batchTotal.toLocaleString()} บาท`;

        saveToDaily(batchTotal, batchStats);
        window.location.href = "https://line.me/R/msg/text/?" + encodeURIComponent(msg);
        items = []; render();
    }

    function saveToDaily(totalAmt, stats) {
        const today = new Date().toLocaleDateString();
        let daily = JSON.parse(localStorage.getItem('collectio_daily') || '{}');
        if (!daily[today]) daily[today] = { total: 0, buckets: {} };
        
        daily[today].total += totalAmt;
        for (let b in stats) {
            daily[today].buckets[b] = (daily[today].buckets[b] || 0) + stats[b];
        }
        localStorage.setItem('collectio_daily', JSON.stringify(daily));
    }

    function sendDailySummary() {
        const today = new Date().toLocaleDateString();
        const branch = document.getElementById('branch').value;
        const daily = JSON.parse(localStorage.getItem('collectio_daily') || '{}');
        const data = daily[today];

        if (!data || data.total === 0) return alert("ยังไม่มียอดจัดเก็บของวันนี้");

        let msg = `📊 สรุปยอดจัดเก็บรายวัน (แยก Bucket)\nสาขา: ${branch}\nประจำวันที่: ${today}\n---\n`;
        const sortedBuckets = Object.keys(data.buckets).sort();
        sortedBuckets.forEach(b => {
            msg += `${b}: ${data.buckets[b].toLocaleString()} บาท\n`;
        });
        msg += `---\nยอดรวมทั้งหมด: ${data.total.toLocaleString()} บาท`;

        window.location.href = "https://line.me/R/msg/text/?" + encodeURIComponent(msg);
    }
</script>

</body>
</html>
